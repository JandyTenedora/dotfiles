# --- General ---
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"  # True colour (critical for Neovim themes)
set -g escape-time 0                               # No delay for Neovim escape key
set -g focus-events on                             # Let Neovim detect focus change
set -g mouse on                                    # Mouse support
setw -g mode-keys vi                               # Vi-style copy mode (v=select, y=yank)
set -g history-limit 10000

# --- Indexing ---
set -g base-index 1                                # Start windows at 1 not 0
setw -g pane-base-index 1

# --- Keybindings ---
unbind C-b
set -g prefix C-a                                  # Use Ctrl+a as prefix
bind C-a send-prefix

bind r source-file ~/.tmux.conf \; display "Config reloaded!"  # Reload config

# Vim-style pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Claude Code popup (no prefix needed — root table binding)
bind -n 'C-\' if-shell -F '#{==:#{session_name},claude-neovim}' { detach-client } { display-popup -E -w 80% -h 80% "tmux new-session -A -s claude-neovim 'claude'" }

# Window picker
bind w run-shell 'tmux choose-tree -Nwf "##{==:##{session_name},#{session_name}}"'
bind W choose-tree -w

# Intuitive splits
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# --- Clipboard (macOS) ---
set -g set-clipboard on
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "pbcopy"

# --- Status Bar ---
set -g status-position top
set -g status-style 'bg=#1e1e2e fg=#cdd6f4'
set -g window-status-current-style 'bg=#89b4fa fg=#1e1e2e bold'
set -g status-left-length 40                       # Don't truncate session name
set -g status-left '#[bg=#89b4fa,fg=#1e1e2e,bold] #S #[default] '
set -g status-right '#[fg=#6c7086]%H:%M '
set -g pane-border-style 'fg=#313244'
set -g pane-active-border-style 'fg=#89b4fa'

# --- Plugins ---
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

set -g @continuum-restore 'on'                     # Auto restore on tmux start
set -g @resurrect-capture-pane-contents 'on'       # Save pane contents too

run '~/.tmux/plugins/tpm/tpm'                      # Keep this at the bottom!
